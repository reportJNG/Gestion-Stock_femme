<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors-ligne — Gestion Stock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fafafa;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; }
    h1 { font-size: 24px; margin-bottom: 12px; color: #18181b; }
    p { color: #71717a; margin-bottom: 24px; line-height: 1.5; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    button {
      background: #18181b;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #27272a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Vous etes hors-ligne</h1>
    <p>Les donnees seront synchronisees automatiquement des que la connexion sera retablie.</p>
    <button onclick="window.location.reload()">Reessayer</button>
  </div>
</body>
</html>
